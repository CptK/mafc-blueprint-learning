benchmark:
  name: veritas
  split: 2025_q4
  label_scheme: 7          # 3 (true/false/other) or 7 (full VeriTaS scheme)
  # data_path: data/custom  # override default data/<name>_<split> path
  # sample_ids: ["123", "456"]  # run specific samples only
  first_n: 4               # run first N samples; remove to run all

agents:
  fact_check:
    model: qwen_3_5_122b
    temperature: 1.0
    max_response_length: 64000  # increase for reasoning models (reasoning tokens count here too)
    workers: 4               # parallel delegation tasks within one claim

  web_search:
    model: qwen_3_5_122b
    temperature: 1.0
    max_response_length: 20000  # per-source summarization output; 4096 is enough for non-reasoning
    workers: 4               # parallel summarization calls per query (uses vLLM batching)
    max_iterations: 2        # web search rounds per delegated task
    max_queries_per_step: 5  # search queries issued per round (planner may issue fewer)
    max_results_per_query: 4 # sources retrieved per search query

  media:
    model: qwen_3_5_122b
    temperature: 1.0
    max_response_length: 64000

  judge:
    model: qwen_3_5_122b
    temperature: 1.0
    max_response_length: 64000

blueprints:
  selector_model: qwen_3_5_122b
  config_dir: config/blueprints

run:
  concurrency: 4           # claims processed in parallel (each in its own thread)
  timeout_per_sample:      # seconds per claim; leave empty for no timeout
  traces: true             # write per-claim trace files to out/<run>/traces/
  log_level: INFO          # DEBUG for verbose model I/O
