name: dated_event
description: Verifies claims about specific events tied to a date, location, or time period, with or without accompanying media.

entry_conditions:
  all:
    - feature: "has_date"
      op: "=="
      value: true
  any: []

selector_hints:
  positive:
    features: ["has_date"]
    examples:
      - "An earthquake of magnitude 7.8 struck Turkey on February 6, 2023."
      - "NATO expanded to include Finland in April 2023."
      - "The Notre Dame fire in 2019 completely destroyed the cathedral."
      - "This photo was taken during the 2020 Beirut explosion."
      - "During the 2021 Capitol riot, police were ordered to stand down."
  negative:
    features: []
    examples:
      - "Elon Musk said he will colonize Mars."
      - "This image shows police brutality."
      - "The government is hiding the truth about vaccines."

policy_constraints:
  allowed_actions: [web_search, media]
  max_iterations: 3
  require_counterevidence_search: true

required_checks:
  - id: event_occurrence_verified
    description: Whether the described event actually occurred was investigated using primary sources.
  - id: date_location_accurate
    description: The claimed date and location of the event were verified against authoritative sources.
  - id: event_details_accurate
    description: Key factual details of the event (scale, actors, outcome) were checked against reporting.
  - id: text_media_consistent
    description: If media is present, it is authentic and consistent with the claimed event, date, and location (applies when media is present).
  - id: counterevidence_checked
    description: Sources contradicting the claimed event details or known distortions of the event narrative were searched for.

verification_graph:
  start_node: layer0_event_search
  nodes:
    - id: layer0_event_search
      type: actions
      actions:
        - action: web_search
          intent: find primary sources confirming or denying whether the described event occurred
          query_guidance: use event name, claimed date, and location as search terms; target news archives and official sources
        - action: media
          intent: if media is present, analyze it for authenticity and consistency with the claimed event and date
          query_guidance: look for geolocation cues, visible timestamps, recognizable landmarks, or contextual visual details
      transition:
        - if: continue
          to: layer1_synthesis

    - id: layer1_synthesis
      type: synthesis
      transition:
        - if: "event occurrence, date, and location are conclusively established or clearly disproved by reliable sources, and media is verified if present"
          to: layer4_gate
        - if: "event details are disputed, sourcing is weak, or date and location require further corroboration"
          to: layer2_corroboration_search

    - id: layer2_corroboration_search
      type: actions
      actions:
        - action: web_search
          intent: corroborate event details and verify the claimed date and location with independent sources
          query_guidance: look for news archives, Wikipedia, official government or institutional reports
        - action: web_search
          intent: search for counter-evidence or known distortions of the event narrative
          query_guidance: include fact-check articles, corrections, or alternative accounts of the same event
      transition:
        - if: continue
          to: layer2_synthesis

    - id: layer2_synthesis
      type: synthesis
      transition:
        - if: "all event details are verified or refuted and evidence is sufficient for a verdict"
          to: layer4_gate
        - if: "specific factual details remain disputed or unresolved that targeted search could address"
          to: layer3_targeted_search

    - id: layer3_targeted_search
      type: actions
      actions:
        - action: web_search
          intent: resolve the specific remaining disputes identified in the previous synthesis
          query_guidance: formulate queries directly targeting the open questions — disputed casualty figures, exact timeline, conflicting official statements, or specific actor involvement
      transition:
        - if: continue
          to: layer3_synthesis

    - id: layer3_synthesis
      type: synthesis
      transition:
        - if: continue
          to: layer4_gate

    - id: layer4_gate
      type: gate
      rules:
        support_conditions: [event_occurrence_verified, date_location_accurate, event_details_accurate, text_media_consistent, counterevidence_checked]
        refute_conditions: []
        if_fail: return unknown

termination:
  - if: budget.exhausted == true
    return: unknown
  - if: gate.result == support
    return: label_from_judge_support
  - if: gate.result == refute
    return: label_from_judge_refute
  - if: gate.result == unknown
    return: unknown
