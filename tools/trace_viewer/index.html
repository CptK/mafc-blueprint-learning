<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fact-Check Trace Viewer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <main class="main">
        <div id="canvasWrap">
          <div id="graph"></div>
        </div>
      </main>

      <div id="divider" class="divider" aria-hidden="true"></div>

      <aside class="sidebar">
        <div class="controls">
          <label class="upload">
            <input id="fileInput" type="file" accept=".json,application/json" />
            <span>Open Trace JSON</span>
          </label>
          <a href="./blueprints.html" class="button">Blueprints &rarr;</a>
          <select id="sampleSelect" class="bp-select">
            <option value="">— load a sample trace —</option>
          </select>
          <span id="status" class="subtle">No trace loaded yet.</span>
        </div>

        <div id="summary" class="summary-grid"></div>

        <div class="legend">
          <span><i class="swatch" style="background: var(--claim)"></i>Claim</span>
          <span><i class="swatch" style="background: var(--blueprint)"></i>Blueprint</span>
          <span><i class="swatch" style="background: var(--iteration)"></i>Iteration</span>
          <span><i class="swatch" style="background: var(--task)"></i>Delegated Task</span>
          <span><i class="swatch" style="background: var(--childrun)"></i>Child Agent</span>
          <span><i class="swatch" style="background: var(--query)"></i>Query</span>
          <span><i class="swatch" style="background: var(--select)"></i>Selection</span>
          <span><i class="swatch" style="background: var(--retrieval)"></i>Retrieved Source</span>
          <span><i class="swatch" style="background: var(--result)"></i>Result</span>
        </div>

        <hr class="sidebar-divider" />

        <h2>Details</h2>
        <div id="detailMeta" class="pillbar"></div>
        <div id="detailBody" class="empty">Nothing selected yet.</div>
      </aside>
    </div>

    <script src="https://unpkg.com/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
    <script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
    <script src="https://unpkg.com/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
