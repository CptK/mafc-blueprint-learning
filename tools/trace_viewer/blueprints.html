<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blueprint Viewer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <main class="main">
        <div id="canvasWrap">
          <div id="graph"></div>
        </div>
      </main>

      <div id="divider" class="divider" aria-hidden="true"></div>

      <aside class="sidebar">
        <div class="controls">
          <select id="blueprintSelect" class="bp-select">
            <option value="">— select a blueprint —</option>
          </select>
          <a href="/" class="button">&larr; Traces</a>
          <span id="status" class="subtle">No blueprint loaded.</span>
        </div>

        <div id="blueprintMeta"></div>

        <div class="node-legend">
          <span><i class="swatch" style="background: var(--task)"></i>Actions</span>
          <span><i class="swatch" style="background: var(--iteration)"></i>Synthesis</span>
          <span><i class="swatch" style="background: var(--result)"></i>Gate</span>
        </div>

        <hr class="sidebar-divider" />

        <h2>Node Details</h2>
        <div id="nodeDetail" class="empty">Click a graph node to see details.</div>
      </aside>
    </div>

    <script src="https://unpkg.com/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
    <script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
    <script src="https://unpkg.com/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
    <script type="module" src="./blueprint-app.js"></script>
  </body>
</html>
